name: Upstream MLX-C Sync Check

on:
  schedule:
    # Check weekly on Monday 9 AM UTC
    - cron: '0 9 * * MON'
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-check.yml'

jobs:
  check-upstream:
    runs-on: macos-latest
    permissions:
      contents: read
    outputs:
      current: ${{ steps.check.outputs.current }}
      latest: ${{ steps.check.outputs.latest }}
      update_available: ${{ steps.check.outputs.update_available }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check MLX-C versions
        id: check
        run: |
          # Get current locked version
          CURRENT=$(cd build/_deps/mlx-src && git describe --tags 2>/dev/null || echo "unknown")
          
          # Get latest from GitHub API
          LATEST=$(curl -s https://api.github.com/repos/ml-explore/mlx-c/releases/latest | jq -r .tag_name)
          
          echo "current=$CURRENT"
          echo "latest=$LATEST"
          
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "Update available: $CURRENT → $LATEST"
            echo "update_available=true" >> $GITHUB_OUTPUT
          else
            echo "Already at latest: $CURRENT"
            echo "update_available=false" >> $GITHUB_OUTPUT
          fi

  notify:
    needs: check-upstream
    if: needs.check-upstream.outputs.update_available == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ needs.check-upstream.outputs.current }}';
            const latest = '${{ needs.check-upstream.outputs.latest }}';
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[MAINTENANCE] Update MLX-C from ${current} to ${latest}`,
              body: `🔄 **Upstream Update Available**

MLX-C has been updated from ${current} to ${latest}.

## Action Items
1. Review [MLX-C release notes](https://github.com/ml-explore/mlx-c/releases/tag/${latest})
2. Check breaking changes
3. Plan update (see [MAINTENANCE.md](./MAINTENANCE.md) Phase 1-6)
4. Test thoroughly before merging

## Quick Start
\`\`\`bash
git checkout -b update/mlx-${latest}
cd build/_deps/mlx-src && git fetch --all && git checkout ${latest} && cd ../..
git add build/_deps/mlx-src
git commit -m "chore: Update MLX-C to ${latest}"
./scripts/regenerate.sh
go test ./... -v -race
\`\`\`

See [MAINTENANCE.md](./MAINTENANCE.md) for detailed instructions.`,
              labels: ['maintenance', 'upstream-sync', 'mlx-c-update']
            });

      - name: Summary
        run: |
          echo "## 🔄 Upstream Update Available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Current**: ${{ needs.check-upstream.outputs.current }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest**: ${{ needs.check-upstream.outputs.latest }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See GitHub Issues for details." >> $GITHUB_STEP_SUMMARY
